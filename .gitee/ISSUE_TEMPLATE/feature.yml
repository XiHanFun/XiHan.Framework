name: ✨ 功能建议
description: 提出一个新功能或对现有功能的改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！好的想法让框架更好。请尽量说明「为什么需要」以及「期望它如何工作」。
        > 提交前请先搜索现有 Issue，避免重复。

  - type: checkboxes
    id: preflight
    attributes:
      label: 前置确认
      description: 提交前请逐项确认
      options:
        - label: 我已搜索过现有 Issue，确认这不是重复建议
          required: true
        - label: 我确认这是对 XiHan.Framework 的功能建议，而非使用问题咨询
          required: true

  - type: textarea
    id: problem
    attributes:
      label: 需求背景 / 痛点
      description: 你遇到了什么问题，或当前有哪些不便？这个建议想解决什么？
      placeholder: 例如：EventBus 目前只支持 A/B 两种 Broker，希望增加对 C 的支持…
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 期望的功能
      description: 你希望它如何工作？尽量具体地描述预期的 API、行为或扩展点。
    validations:
      required: true

  - type: dropdown
    id: layer
    attributes:
      label: 所属层
      description: 该建议主要涉及的架构层
      options:
        - 公共层（Utils）
        - 元数据层（Metadata）
        - 核心层（Core / 模块系统 / DI / 生命周期）
        - 领域层（Domain / Domain.Shared）
        - 应用层（Application / Contracts / MultiTenancy / Validation / Settings）
        - 基础设施层（Data / Caching / Auth / EventBus / AI / Bot / Tasks 等）
        - Web 层（Web.Core / Web.Api / Web.Docs / Gateway / Grpc / RealTime）
        - 新模块（现有分层之外）
        - 测试 / 文档 / 构建
        - 其他 / 不确定
    validations:
      required: true

  - type: input
    id: module
    attributes:
      label: 相关模块 / 包名
      description: 具体的模块或 NuGet 包名（如为新模块可留空）
      placeholder: XiHan.Framework.EventBus
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你是否考虑过其他实现方式或临时规避方法？
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: 补充说明
      description: 参考实现、其他框架做法、相关链接或任何其他上下文
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: 参与贡献
      description: 可选
      options:
        - label: 我愿意提交 PR 来实现这个功能
          required: false
